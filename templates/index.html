<!DOCTYPE html>
<html>
<head>
  <title>Stock Price Visualizer</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
    h1 { color: #1a1a2e; }
    .header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    .stats { display: flex; gap: 20px; margin-top: 10px; }
    .stat-box { background: #e8f4fd; padding: 10px 20px; border-radius: 8px; }
    form { display: flex; gap: 10px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
    input, select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    button { padding: 8px 20px; background: #0078d4; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #005fa3; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .chart-box { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Stock Price Visualizer</h1>
    <form method="POST">
      <input type="text" name="ticker" value="{{ ticker }}" placeholder="e.g. AAPL, TSLA, MSFT" />
      <select name="period">
        {% for p in ["1mo","3mo","6mo","1y","2y"] %}
        <option value="{{ p }}" {% if p == period %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
      </select>
      <button type="submit">Analyse</button>
    </form>
    <div class="stats">
      <div class="stat-box"><strong>Company:</strong> {{ company_name }}</div>
      <div class="stat-box"><strong>Ticker:</strong> {{ ticker }}</div>
      <div class="stat-box"><strong>Current Price:</strong> ${{ current_price }}</div>
    </div>
  </div>
  {% if error %}
<div style="background:#ffe0e0;padding:15px;border-radius:8px;margin-bottom:20px;color:#c00;">
  {{ error }}
</div>
{% endif %}

  <div class="grid">
    {% for chart in charts %}
    <div class="chart-box">
      <div id="chart{{ loop.index }}"></div>
      <script>
        var data = {{ chart | safe }};
        Plotly.newPlot('chart{{ loop.index }}', data.data, data.layout, {responsive: true});
      </script>
    </div>
    {% endfor %}
  </div>
</body>
</html>
